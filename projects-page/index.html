<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brandon Hulse — Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      header.page-hero {
        background: linear-gradient(135deg, var(--brand) 0%, #2a7f9a 60%, var(--accent) 100%);
        color: #fff;
        padding: 3.5rem 0 2.5rem;
        text-align: center;
      }
      header.page-hero h1 { color: #fff; font-size: 2.4rem; letter-spacing: -1px; }
      header.page-hero p { color: rgba(255,255,255,0.8); }

      /* Card grid */
      .project-card {
        display: block;
        border-radius: 0.75rem;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 1px 4px rgba(26,95,122,0.08), 0 4px 16px rgba(26,95,122,0.07);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        text-decoration: none;
        color: inherit;
        height: 100%;
      }
      .project-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 24px rgba(26,95,122,0.15), 0 2px 8px rgba(26,95,122,0.1);
        color: inherit;
      }

      /* Thumbnail */
      .project-thumb {
        aspect-ratio: 16 / 9;
        width: 100%;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .project-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        inset: 0;
      }
      .project-thumb-icon {
        font-size: 2.5rem;
        color: rgba(255,255,255,0.4);
      }

      /* Card body */
      .project-info { padding: 1rem 1.1rem 1.2rem; }
      .project-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 0.2rem;
        line-height: 1.3;
      }
      .project-date {
        font-size: 0.75rem;
        color: var(--brand);
        font-weight: 500;
        margin-bottom: 0.45rem;
      }
      .project-desc {
        font-size: 0.82rem;
        color: #555;
        line-height: 1.5;
        margin-bottom: 0.65rem;
      }
      .project-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
      .project-tag {
        font-size: 0.72rem;
        font-weight: 500;
        padding: 0.18rem 0.6rem;
        border-radius: 99px;
        background: var(--bg-soft);
        color: var(--brand);
      }
    </style>
  </head>
  <body class="bg-white">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="../index.html">← Home</a>
      </div>
    </nav>

    <!-- Hero -->
    <header class="page-hero">
      <div class="container">
        <h1 class="fw-bold mb-2">Projects</h1>
        <p class="mb-0">A collection of things I've built — click any card to learn more.</p>
      </div>
    </header>

    <!-- Grid (rendered by JS) -->
    <section class="py-5">
      <div class="container" style="max-width:1100px;">
        <div class="row g-4" id="cards-container"></div>
      </div>
    </section>

    <footer class="py-4 border-top bg-white text-center small text-body-secondary">
      <span>© <span id="year"></span> Brandon Hulse</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="projects.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const container = document.getElementById('cards-container');

      PROJECTS.forEach(project => {
        const thumbContent = project.thumbnail
          ? `<img src="${project.thumbnail}" alt="${project.title}">`
          : `<i class="bi bi-code-square project-thumb-icon"></i>`;

        const tags = project.tags
          .map(t => `<span class="project-tag">${t}</span>`)
          .join('');

        const col = document.createElement('div');
        col.className = 'col-12 col-sm-6 col-lg-4';
        col.innerHTML = `
          <a href="${project.slug}/" class="project-card">
            <div class="project-thumb" style="background: ${project.gradient}">
              ${thumbContent}
            </div>
            <div class="project-info">
              <p class="project-date">${project.date}</p>
              <p class="project-title">${project.title}</p>
              <p class="project-desc">${project.description}</p>
              <div class="project-tags">${tags}</div>
            </div>
          </a>`;
        container.appendChild(col);
      });
    </script>
  </body>
</html>
